# fail-first enforcement for Power Eagle.
# Opted into HARD enforcement by owner confirmation (2026-06-19).

[bdd]
enforcement = "hard"
require_red_green_proof = true
features_dir = "features"
allow_runtime_override = true
default_exceptions = ["prototype", "generated_code", "configuration_only", "spike"]
override_active = false
override_reason = ""
override_scope = ""
override_exception_class = ""

